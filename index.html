<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>APRR BAU — Rendu méthodologie</title>
<link rel="stylesheet" href="lib/leaflet.css"/>
<script src="lib/leaflet.js"></script>
<script src="lib/chart.umd.min.js"></script>
<script>
/* CDN fallback if the local libs are missing (e.g. lib/ folder not shipped). */
if (typeof L === "undefined") { document.write('<scr'+'ipt src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/scr'+'ipt>'); }
if (typeof Chart === "undefined") { document.write('<scr'+'ipt src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"><\/scr'+'ipt>'); }
</script>
<style>
  :root { --bg:#f5f6f8; --panel:#ffffff; --ink:#1f2733; --muted:#6b7785; --line:#e3e7ee; --accent:#1f78b4; --field:#ffffff; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; font-family:"Segoe UI",system-ui,Roboto,sans-serif; color:var(--ink); background:var(--bg); }
  #app { display:grid; grid-template-columns:360px 1fr; grid-template-rows:1fr auto; height:100vh; }
  #side { grid-row:1/3; background:var(--bg); border-right:1px solid var(--line); overflow-y:auto; padding:14px; }
  #map { grid-column:2; grid-row:1; }
  #tablewrap { grid-column:2; grid-row:2; background:var(--panel); border-top:1px solid var(--line); max-height:42vh; display:flex; flex-direction:column; }
  .logobar { display:flex; align-items:center; gap:14px; margin-bottom:8px; }
  .logobar .logo { display:flex; align-items:center; }
  .logo img { display:block; width:auto; }
  .logo svg { display:block; width:auto; }
  .logo-aprr img { height:46px; }
  .logo-rc svg { height:30px; width:auto; }
  .title { font-weight:700; font-size:15px; margin:2px 0 0; }
  .subtitle { color:var(--muted); font-size:11px; }
  #err { display:none; position:fixed; z-index:3000; top:0; left:0; right:0; background:#b00020; color:#fff; padding:9px 14px; font-size:13px; }
  .maplegend { background:rgba(255,255,255,.94); padding:7px 10px; border-radius:6px; font-size:11px; line-height:1.5; max-height:48vh; overflow:auto; box-shadow:0 1px 4px rgba(0,0,0,.25); }
  .maplegend b { display:block; margin:6px 0 3px; } .maplegend b:first-child { margin-top:0; }
  .maplegend i { display:inline-block; width:11px; height:11px; margin-right:5px; vertical-align:-1px; border-radius:2px; }
  #map.hide-labels .lbl-pas { display:none; }
  #reset { margin-top:8px; width:100%; padding:6px; border:1px solid var(--line); background:#fff; border-radius:5px; cursor:pointer; }
  #reset:hover { background:#eef1f6; }
  .chartbox { position:relative; height:150px; }
  table.pt th input { width:8ch; font:11px inherit; padding:1px 3px; border:1px solid var(--line); border-radius:3px; }
  tbody tr.sel { background:#fde9a9; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:10px 12px; margin-bottom:12px; }
  .popimg { max-width:260px; max-height:190px; display:block; margin:0 0 6px; border-radius:6px; }
  .lbl { font-size:11px; font-weight:600; white-space:nowrap; line-height:1.1; }
  .lbl-pas { color:#1f2733; background:rgba(255,255,255,.9); border:1px solid #c9ced6; border-radius:4px; padding:1px 4px; box-shadow:0 1px 2px rgba(0,0,0,.12); }
  .lbl-pr { color:#021; background:#ffce3a; border-radius:9px; padding:1px 7px; box-shadow:0 0 0 1px #0006; }
  h2 { font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); margin:0 0 8px; }
  .kpis { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .kpi { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:8px 10px; }
  .kpi b { font-size:18px; } .kpi span { display:block; color:var(--muted); font-size:11px; }
  label { font-size:12px; color:var(--muted); display:block; margin:6px 0 2px; }
  select, input[type=text] { width:100%; background:var(--field); color:var(--ink); border:1px solid var(--line); border-radius:6px; padding:6px; }
  .swatch { width:12px; height:12px; border-radius:3px; display:inline-block; }
  .legend { display:flex; flex-wrap:wrap; gap:6px 12px; font-size:12px; margin-top:6px; color:var(--muted); }
  canvas { margin-top:4px; }
  #tablebar { display:flex; gap:8px; align-items:center; padding:6px 10px; border-bottom:1px solid var(--line); }
  #tablebar input[type=text] { flex:1; }
  #tablebar button.exp { color:#fff; border:0; border-radius:5px; padding:4px 10px; cursor:pointer; font-weight:600; white-space:nowrap; }
  #btnXlsx { background:#1a7f4b; } #btnXlsx:hover { background:#16683e; }
  #btnCsv { background:#557; } #btnCsv:hover { background:#445; }
  #btnGeojson { background:#1f78b4; } #btnGeojson:hover { background:#185f8d; }
  #btnShp { background:#b5651d; } #btnShp:hover { background:#8f4f16; }
  table { border-collapse:collapse; font-size:12px; width:max-content; min-width:100%; }
  thead th { position:sticky; top:0; z-index:1; background:#eef1f6; cursor:pointer; padding:5px 8px; text-align:right; border-bottom:1px solid var(--line); white-space:nowrap; }
  thead th:first-child, td:first-child { text-align:left; }
  tbody td { padding:4px 8px; text-align:right; border-bottom:1px solid #eef1f6; white-space:nowrap; }
  tbody tr:hover { background:#eef6ff; }
  /* both scrollbars: bounded height -> vertical; max-content table -> horizontal */
  #tablescroll { overflow:auto; max-height:34vh; }
  button.mini { background:var(--accent); color:#fff; border:0; border-radius:5px; padding:2px 8px; cursor:pointer; font-weight:600; }
  .muted { color:var(--muted); font-size:11px; }
  .leaflet-popup-content { font-size:12px; max-height:240px; overflow:auto; }
  .leaflet-popup-content table td { padding:1px 6px; border-bottom:1px solid #eee; }
  details > summary { cursor:pointer; color:var(--accent); padding:6px 10px; font-weight:600; }
</style>
</head>

<script>
var CFG = {"tile_url": "https://{s}.tile.openstreetmap.de/{z}/{x}/{y}.png", "tile_attribution": "&copy; OpenStreetMap", "tile_subdomains": "abc", "label_zoom_min": 17, "bounds": [4.728129, 45.512238, 6.309058, 46.111975]};
var LAYERS = window.LAYERS || {};
function showErr(m){ var d=document.getElementById("err"); if(d){ d.style.display="block"; d.textContent=m; } }
window.addEventListener("error", function(e){ showErr("Erreur : "+(e && e.message ? e.message : e)); });

/* ---------- colour schemes ---------- */
var CLASSE_COLORS = { "Fissuration":"#1f78b4", "Faiençage":"#ff7f0e", "Arrachement":"#d62728" };
var NOTE_COLORS   = { 0:"#1a9641", 1:"#fdae61", 2:"#d7191c" };
var GRAV_COLORS   = { 0:"#1a9641", 1:"#a6d96a", 2:"#fdae61", 3:"#d7191c" };
var GRAV_LABEL    = { 0:"0 · Rien", 1:"1 · Amorce", 2:"2 · Enclenchée", 3:"3 · Sévère" };
var TICK = "#6b7785";
// distinct colour per road_data sous_classe (built from the data)
var SOUS_PALETTE = ['#e6194b','#3cb44b','#4363d8','#f58231','#911eb4','#42d4f4','#f032e6',

var SONORIVE_COLOR = "#8a6dff";
var CHG_COLOR = "#111111";   // changement_revetement_bau intersection lines
// "AUTRE" detections are NOT shown among the sous_classe detections — they are
// split off into the dedicated "Sonorive" layer instead.
function isAutre(v){ return /^\s*autre\s*$/i.test(String(v==null?"":v)); }
var sousColorMap = {};
(function(){
  var d = LAYERS.road_data; if(!d) return;
  var vals={}; d.features.forEach(function(f){ var v=f.properties.sous_classe; if(v && !isAutre(v)) vals[v]=1; });
  Object.keys(vals).sort().forEach(function(v,i){ sousColorMap[v]=SOUS_PALETTE[i%SOUS_PALETTE.length]; });
})();
function sousColor(v){ return sousColorMap[v] || '#888'; }

var METRICS = [
  { key:"IG", label:"Indicateur global (IG)",       kind:"ind",  classe:"classe_IG" },
  { key:"IF", label:"Indicateur fissuration (IF)",   kind:"ind",  classe:"classe_IF" },
  { key:"IA", label:"Indicateur arrachement (IA)",   kind:"ind",  classe:"classe_IA" },
  { key:"note_Fissuration", label:"Note fissuration", kind:"note" },
  { key:"note_Faiencage",   label:"Note faïençage",   kind:"note" },
  { key:"note_Arrachement", label:"Note arrachement", kind:"note" },
];

function len(p){ return Math.max(0, (p.cumulf||0) - (p.cumuld||0)); }
function curMetric(){ return METRICS.find(function(m){ return m.key===document.getElementById("metric").value; }); }

function colorForPas(p){
  var m = curMetric();
  if(m.kind==="ind"){ return GRAV_COLORS[p[m.classe]] || "#888"; }
  return NOTE_COLORS[p[m.key]] || "#888";
}

if(CFG.bounds){ map.fitBounds([[CFG.bounds[1],CFG.bounds[0]],[CFG.bounds[3],CFG.bounds[2]]]); }

var pasGroup = L.layerGroup();   // persistent: refilled on metric/filter change

var HIDE_PROPS = { filename:1, url:1 };   // long URLs — shown as image, not text
function popupHtml(name, p){

function styleStatic(name){

    if(name==="changement_revetement_bau"){ return { color:CHG_COLOR, weight:4, opacity:.9, dashArray:"6,4" }; }

var POINT_STYLE = {

function addStatic(name){

/* Sonorive layer = the "AUTRE" detections extracted from road_data. */

/* labels: divIcon text markers — n_pr for PR, "axe : prd+abd à prf+abf" for pas */
function addLabels(){

/* pas layer rebuilt on metric/filter change so colours + visibility update */
function passFilter(p){
  var ax=document.getElementById("fAxe").value;
  var igMax=+document.getElementById("fIg").value;
  var txt=document.getElementById("fText").value.trim().toLowerCase();
  if(ax && p.axe!==ax) return false;
  if((p.IG!=null) && p.IG>igMax) return false;
  if(txt){ var hay=((p.axe||"")+" "+(p.url||"")).toLowerCase(); if(hay.indexOf(txt)<0) return false; }
  return true;
}

function buildPas(){
  pasGroup.clearLayers();
  var fc=LAYERS.pas_20; if(!fc) return;
  var feats=fc.features.filter(function(f){ return passFilter(f.properties); });
  L.geoJSON({type:"FeatureCollection",features:feats},{
    style:function(f){ return { color:"#444", weight:.4, fillColor:colorForPas(f.properties), fillOpacity:.72 }; },
    onEachFeature:function(f,l){ l.bindPopup(popupHtml("pas_20",f.properties)); }
  }).addTo(pasGroup);
  updateCharts(feats.map(function(f){return f.properties;}));
  updateTable(feats.map(function(f){return f.properties;}));
  document.getElementById("fCount").textContent = feats.length+" / "+fc.features.length+" pas affichés";
}

  props.forEach(function(p){ var k=keyFn(p); if(k in acc) acc[k]+=len(p); });
  return keys.map(function(k){ return Math.round(acc[k]); });

/* --- minimal Shapefile writer (polygon, WGS84) — dependency-free --- */

      if(v==null) return;
      if(typeof v!=="boolean") isBool=false;
      if(typeof v==="number" && isFinite(v)){ if(v%1!==0) anyDec=true; }
      else allNum=false;
    });
    if(isBool){ t="L"; w=1; }
    else if(allNum){
      t="N"; dec=anyDec?3:0;
      feats.forEach(function(f){ var v=f.properties[fd.key]; if(v==null)return;
        var s=(dec?Number(v).toFixed(dec):String(Math.round(v))); if(s.length>maxc)maxc=s.length; });
      w=Math.min(19,Math.max(maxc, dec?dec+2:1));
    } else {
      t="C"; dec=0;
      feats.forEach(function(f){ var v=f.properties[fd.key]; if(v==null)return;
        var b=enc.encode(typeof v==="boolean"?(v?"T":"F"):String(v)).length; if(b>maxc)maxc=b; });
      w=Math.min(254,Math.max(1,maxc));
    }
    fd.type=t; fd.width=w; fd.dec=dec;
  });
  var recSize=1; fields.forEach(function(fd){ recSize+=fd.width; });
  var hdrSize=32+32*fields.length+1;
  var buf=new Uint8Array(hdrSize+recSize*feats.length+1);
  var dv=new DataView(buf.buffer);
  buf[0]=0x03;                                   // dBASE III
  var d=new Date(); buf[1]=d.getFullYear()-1900; buf[2]=d.getMonth()+1; buf[3]=d.getDate();
  dv.setInt32(4,feats.length,true);
  dv.setInt16(8,hdrSize,true); dv.setInt16(10,recSize,true);
  buf[29]=0x00;                                  // language driver unset — see .cpg (UTF-8)
  var off=32;
  fields.forEach(function(fd){
    var nb=enc.encode(fd.name); for(var i=0;i<nb.length && i<11;i++) buf[off+i]=nb[i];
    buf[off+11]=fd.type.charCodeAt(0);
    buf[off+16]=fd.width; buf[off+17]=fd.dec;
    off+=32;
  });
  buf[off++]=0x0D;                               // header terminator
  feats.forEach(function(f){
    buf[off++]=0x20;                             // not deleted
    fields.forEach(function(fd){
      var v=f.properties[fd.key], s;
      if(fd.type==="L"){ s = (v==null?"?":(v?"T":"F")); }
      else if(fd.type==="N"){ s = (v==null||v==="") ? "" : (fd.dec?Number(v).toFixed(fd.dec):String(Math.round(v))); }
      else { s = (v==null?"":(typeof v==="boolean"?(v?"T":"F"):String(v))); }
      var b=enc.encode(s);
      if(b.length>fd.width) b=b.slice(0,fd.width);
      if(fd.type==="N"){ for(var i=0;i<fd.width-b.length;i++) buf[off++]=0x20; for(var j=0;j<b.length;j++) buf[off++]=b[j]; }   // right-justified
      else { for(var j2=0;j2<b.length;j2++) buf[off++]=b[j2]; for(var i2=0;i2<fd.width-b.length;i2++) buf[off++]=0x20; }        // left-justified
    });
  });
  buf[off]=0x1A;                                 // EOF
  return buf;
}
var WGS84_PRJ='GEOGCS["GCS_WGS_1984",DATUM["D_WGS_1984",SPHEROID["WGS_1984",6378137.0,298.257223563]],PRIMEM["Greenwich",0.0],UNIT["Degree",0.0174532925199433]]';
function exportPasShapefile(){
  var feats=filteredPasFeatures().filter(function(f){
    return f.geometry && (f.geometry.type==="Polygon" || f.geometry.type==="MultiPolygon");
  });
  if(!feats.length){ showErr("Aucun pas (polygone) à exporter."); return; }
  var sh=_shpBuffers(feats);
  var files=[
    {name:"pas_20.shp", data:sh.shp},
    {name:"pas_20.shx", data:sh.shx},
    {name:"pas_20.dbf", data:_dbfBuffer(feats)},
    {name:"pas_20.prj", data:WGS84_PRJ},
    {name:"pas_20.cpg", data:"UTF-8"}
  ];
  _download(_zip(files), "pas_20_shp_"+feats.length+".zip");
}

/* ---------- controls ---------- */
function buildControls(){
  var sel=document.getElementById("metric");
  METRICS.forEach(function(m){ var o=document.createElement("option"); o.value=m.key; o.textContent=m.label; sel.appendChild(o); });
  sel.onchange=function(){ buildLegend(); buildPas(); updateMapLegend(); };

  // axes
  var axes={}; (LAYERS.pas_20?LAYERS.pas_20.features:[]).forEach(function(f){ if(f.properties.axe) axes[f.properties.axe]=1; });
  var fa=document.getElementById("fAxe");
  Object.keys(axes).sort().forEach(function(a){ var o=document.createElement("option"); o.value=a;o.textContent=a; fa.appendChild(o); });
  fa.onchange=buildPas;
  document.getElementById("fIg").oninput=function(e){ document.getElementById("fIgVal").textContent=e.target.value; buildPas(); };
  document.getElementById("fText").oninput=buildPas;
  document.getElementById("tblFilter").oninput=function(){ renderBody(); };
  document.getElementById("btnXlsx").onclick=exportTableXlsx;
  document.getElementById("btnCsv").onclick=exportTableCsv;
  document.getElementById("btnGeojson").onclick=exportPasGeojson;
  document.getElementById("btnShp").onclick=exportPasShapefile;
  document.getElementById("reset").onclick=function(){
    fa.value=""; document.getElementById("fIg").value=20; document.getElementById("fIgVal").textContent="20";
    document.getElementById("fText").value=""; document.getElementById("tblFilter").value="";
    tblColFilter={}; document.querySelectorAll("#tbl thead input[data-f]").forEach(function(i){i.value="";});
    buildPas();
  };
}
/* Leaflet layer control (top-right): choose which layers to show. */
function setupLayerControl(){
  var order=[["pas_20","Pas 20 m (IG)",true],["degradations","Dégradations (classe finale)",true],
             ["road_data","Détections (par sous_classe)",false],
             ["sonorive","Sonorive",false],
             ["changement_revetement_bau","Changement revêtement (BAU)",false],
             ["pr","Points repères (PR)",false],["labels","Étiquettes (PR / pas)",false],
             ["image","Images (points)",false]];
  var overlays={};
  order.forEach(function(o){
    var g = (o[0]==="pas_20") ? pasGroup : groups[o[0]];
    if(!g) return;
    overlays[o[1]] = g;
    if(o[2]) g.addTo(map);
  });
  L.control.layers(null, overlays, { collapsed:false, position:"topright" }).addTo(map);
  // track which overlays are visible -> drives the on-map legend
  visibleLayers["Dégradations (classe finale)"]=true;
  map.on("overlayadd", function(e){ visibleLayers[e.name]=true; updateMapLegend(); });
  map.on("overlayremove", function(e){ visibleLayers[e.name]=false; updateMapLegend(); });
}

/* dynamic on-map legend (bottom-right): reflects the pas metric + visible layers */
var visibleLayers={};
var mapLegend=L.control({position:"bottomright"});
mapLegend.onAdd=function(){ this._div=L.DomUtil.create("div","maplegend"); return this._div; };
function updateMapLegend(){
  if(!mapLegend._div) return;
  var m=curMetric(), h="<b>Pas — "+m.label+"</b>";
  if(m.kind==="ind"){ [0,1,2,3].forEach(function(k){ h+="<div><i style='background:"+GRAV_COLORS[k]+"'></i>"+GRAV_LABEL[k]+"</div>"; }); }
  else { [0,1,2].forEach(function(k){ h+="<div><i style='background:"+NOTE_COLORS[k]+"'></i>Niveau "+k+"</div>"; }); }
  if(visibleLayers["Dégradations (classe finale)"]){
    h+="<b>Dégradations — classe finale</b>";
    Object.keys(CLASSE_COLORS).forEach(function(c){ h+="<div><i style='background:"+CLASSE_COLORS[c]+"'></i>"+c+"</div>"; });
  }
  if(visibleLayers["Détections (par sous_classe)"]){
    h+="<b>Détections — sous_classe</b>";
    Object.keys(sousColorMap).sort().forEach(function(v){ h+="<div><i style='background:"+sousColorMap[v]+"'></i>"+v+"</div>"; });
  }
  if(visibleLayers["Sonorive"]){
    h+="<b>Sonorive</b><div><i style='background:"+SONORIVE_COLOR+"'></i>Sonorive (détections « AUTRE »)</div>";
  }
  if(visibleLayers["Changement revêtement (BAU)"]){
    h+="<b>Changement revêtement</b><div><i style='background:"+CHG_COLOR+"'></i>Intersection changement / pas</div>";
  }
  mapLegend._div.innerHTML=h;
}
/* hide the (numerous) pas labels when zoomed out to avoid clutter */
function updateLabels(){ var el=document.getElementById("map"); if(el) el.classList.toggle("hide-labels", map.getZoom() < (CFG.label_zoom_min||17)); }
function buildLegend(){
  var m=curMetric(); var el=document.getElementById("legend"); el.innerHTML="";
  var entries = m.kind==="ind" ? [[0,GRAV_LABEL[0]],[1,GRAV_LABEL[1]],[2,GRAV_LABEL[2]],[3,GRAV_LABEL[3]]].map(function(e){return [GRAV_COLORS[e[0]],e[1]];})
                               : [[NOTE_COLORS[0],"Niveau 0"],[NOTE_COLORS[1],"Niveau 1"],[NOTE_COLORS[2],"Niveau 2"]];
  entries.forEach(function(e){ var s=document.createElement("span"); s.innerHTML="<span class='swatch' style='background:"+e[0]+"'></span> "+e[1]; el.appendChild(s); });
}
function buildKpis(){
  var ps=(LAYERS.pas_20?LAYERS.pas_20.features:[]).map(function(f){return f.properties;});
  var totLen=ps.reduce(function(a,p){return a+len(p);},0);
  var avgIG=ps.length?ps.reduce(function(a,p){return a+(p.IG||0);},0)/ps.length:0;
  var nDeg=ps.filter(function(p){return (p.note_Fissuration||p.note_Faiencage||p.note_Arrachement);}).length;
  var kp=[["Pas",ps.length],["Linéaire", (totLen/1000).toFixed(2)+" km"],["IG moyen",avgIG.toFixed(1)],["Pas dégradés",nDeg]];
  document.getElementById("kpis").innerHTML=kp.map(function(k){return "<div class='kpi'><b>"+k[1]+"</b><span>"+k[0]+"</span></div>";}).join("");
}

/* ---------- boot ---------- */
["image","road_data","degradations","pr","changement_revetement_bau"].forEach(addStatic);
addSonorive();
addLabels();
buildControls();
buildLegend();
buildKpis();
buildPas();
setupLayerControl();   // adds default-visible layers (pas_20 + degradations) to the map
mapLegend.addTo(map); updateMapLegend();
map.on("zoomend", updateLabels); updateLabels();
</script>
